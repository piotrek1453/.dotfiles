add_newline = false

format = """
[╭─](bold blue)$os$directory\
$python\
$nodejs\
$rust\
$golang\
$git_branch$git_status\
$fill\
[ ](bold blue)[ $time ](bold yellow)\
\n[╰─](bold blue)$character
"""

right_format = ""

[fill]
symbol = "─"
style = "bold blue"

[time]
disabled = false
format = "$time"
time_format = "%H:%M:%S"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[os]
disabled = false
format = "[$symbol ](bold white)"

[os.symbols]
Arch = ""

[directory]
format = "[  $path ](bold cyan)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
format = "[ $symbol$branch ](bold purple)"

[git_status]
format = "[$all_status$ahead_behind ](bold yellow)"
conflicted = "✖"
ahead = "⇡"
behind = "⇣"
modified = "+"
staged = "●"
untracked = "?"
deleted = "✘"

[cmd_duration]
min_time = 500
format = "[ 󱎫 $duration ](bold yellow)"

[python]
disabled = false

[nodejs]
disabled = false

[rust]
disabled = false

[golang]
disabled = false
